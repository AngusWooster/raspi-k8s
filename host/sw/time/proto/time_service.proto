syntax = "proto3";

package time_service;

// TimeService exposes the Raspberry Pi system clock over gRPC.
service TimeService {
  rpc GetTime (GetTimeRequest) returns (GetTimeResponse);
}

// GetTimeRequest carries no parameters; the server reads the clock itself.
message GetTimeRequest {}

// GetTimeResponse contains the current time in several representations.
message GetTimeResponse {
  string timestamp   = 1;  // ISO 8601 wall-clock time in UTC, e.g. "2026-06-20T10:30:00+00:00"
  int64 unix_seconds = 2;  // Unix epoch seconds
  int32 unix_nanos   = 3;  // Nanosecond fraction (from time.time_ns())
  string timezone    = 4;  // Local timezone abbreviation, e.g. "CST"
  string hostname    = 5;  // Pod or host name
}
